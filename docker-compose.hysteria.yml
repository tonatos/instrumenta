# Optional overlay: outbound HTTP(S) from api/notifier via local Hysteria2 client.
# Enable: put hysteria2_uri in deploy/inventory.yaml and bootstrap (writes hysteria-client.yaml).
# Disable: clear hysteria2_uri, re-bootstrap (removes config) or:
#   rm -f hysteria-client.yaml && docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --remove-orphans
#
# Go net/http respects HTTPS_PROXY. T-Invest gRPC usually ignores it and stays direct (good for RU APIs).

services:
  hysteria:
    image: tobyxdd/hysteria:v2.10.0
    container_name: instrumenta-hysteria
    restart: unless-stopped
    command: ["client", "-c", "/etc/hysteria/config.yaml"]
    volumes:
      - ./hysteria-client.yaml:/etc/hysteria/config.yaml:ro

  api:
    environment:
      HTTP_PROXY: http://hysteria:8080
      HTTPS_PROXY: http://hysteria:8080
      NO_PROXY: localhost,127.0.0.1,redis,db,web,caddy,hysteria,api,notifier
    depends_on:
      hysteria:
        condition: service_started

  notifier:
    environment:
      HTTP_PROXY: http://hysteria:8080
      HTTPS_PROXY: http://hysteria:8080
      NO_PROXY: localhost,127.0.0.1,redis,db,web,caddy,hysteria,api,notifier
    depends_on:
      hysteria:
        condition: service_started
