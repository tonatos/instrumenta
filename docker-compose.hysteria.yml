# Optional overlay: Hysteria2 client + Telegram-only outbound proxy.
# Enable: put hysteria2_uri in deploy/inventory.yaml and bootstrap (writes hysteria-client.yaml).
# Disable: clear hysteria2_uri, re-bootstrap (removes config) or:
#   rm -f hysteria-client.yaml && docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --remove-orphans
#
# Only TELEGRAM_HTTP_PROXY is set — MOEX / T-Invest / YooKassa stay direct.

services:
  hysteria:
    image: tobyxdd/hysteria:v2.10.0
    container_name: instrumenta-hysteria
    restart: unless-stopped
    command: ["client", "-c", "/etc/hysteria/config.yaml"]
    volumes:
      - ./hysteria-client.yaml:/etc/hysteria/config.yaml:ro

  api:
    environment:
      TELEGRAM_HTTP_PROXY: http://hysteria:8080
    depends_on:
      hysteria:
        condition: service_started

  notifier:
    environment:
      TELEGRAM_HTTP_PROXY: http://hysteria:8080
    depends_on:
      hysteria:
        condition: service_started
