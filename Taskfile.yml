version: "3"

tasks:
  run:back:
    desc: Run backend
    cmds:
      - cd backend && go run ./cmd/api

  run:front:
    desc: Run frontend
    deps: [sync:front]
    dir: ./frontend
    cmds:
      - npm run dev

  run:landing:
    desc: Run marketing landing (independent of frontend)
    dir: ./landing
    cmds:
      - npm install
      - npm run dev

  test:landing:
    desc: Landing e2e (Playwright)
    dir: ./landing
    cmds:
      - npm install
      - npx playwright install chromium
      - npm run test:e2e

  run:notifier:
    desc: Run notification worker locally
    dotenv: [.env]
    cmds:
      - cd backend && go run ./cmd/notifier

  dev:notify:simulate:
    desc: Write fake alert overrides (requires NOTIFICATIONS_DEV=true)
    dotenv: [.env]
    cmds:
      - cd backend && go run ./cmd/dev-notify simulate {{.CLI_ARGS}}

  dev:notify:scan:
    desc: Run one notifier scan cycle (requires NOTIFICATIONS_DEV=true for fake alerts)
    dotenv: [.env]
    cmds:
      - cd backend && go run ./cmd/dev-notify scan

  dev:notify:reset:
    desc: Clear notifier delivery ledger (optionally --portfolio <id>)
    dotenv: [.env]
    cmds:
      - cd backend && go run ./cmd/dev-notify reset {{.CLI_ARGS}}

  test:
    desc: All tests (back, then front)
    cmds:
      - task: test:back
      - task: test:front

  test:back:
    desc: Test backend
    cmds:
      - cd backend && go test ./...

  test:front:
    desc: Test frontend
    deps: [sync:front]
    dotenv: [.env]
    dir: ./e2e/playwright
    cmds:
      - npm install
      - echo "E2E — поднимаем backend/frontend (если ещё не запущены) и гоняем Playwright…"
      - npx playwright test --reporter=line
  
  sync:back:
    desc: Sync backend dependencies
    cmds:
      - cd backend && go mod download
  
  sync:front:
    desc: Sync frontend dependencies
    dir: ./frontend
    cmds:
      - npm install

  deploy:sync:
    desc: Download Porter deploy dependencies
    cmds:
      - cd deploy && go mod download

  deploy:bootstrap:
    desc: First-time VPS setup (Docker, git clone, .env, compose)
    deps: [deploy:sync]
    cmds:
      - cd deploy && go run . bootstrap

  deploy:bootstrap-dry:
    desc: Preview first-time VPS bootstrap
    deps: [deploy:sync]
    cmds:
      - cd deploy && go run . bootstrap -dry-run

  deploy:update:
    desc: Manual update on VPS (git pull + compose pull, keeps .env)
    deps: [deploy:bootstrap]
    cmds:
      - cd deploy && go run . update

  deploy:update-dry:
    desc: Preview manual VPS update
    deps: [deploy:bootstrap]
    cmds:
      - cd deploy && go run . update -dry-run

