version: "3"

tasks:
  run:back:
    desc: Run backend
    deps: [sync:back]
    cmds:
      - uv run --directory backend uvicorn bond_monitor.main:app --reload --port 8000

  run:front:
    desc: Run frontend
    deps: [sync:front]
    dir: ./frontend
    cmds:
      - npm run dev

  run:notifier:
    desc: Run notification worker locally
    deps: [sync:back]
    dotenv: [.env]
    cmds:
      - uv run --directory backend python -m bond_monitor.notifier

  test:
    desc: All tests (back, then front)
    cmds:
      - task: test:back
      - task: test:front

  test:back:
    desc: Test backend
    deps: [sync:back]
    dotenv: [.env]
    cmds:
      - uv run --directory backend pytest tests/unit -q --disable-warnings

  test:front:
    desc: Test frontend
    deps: [sync:back, sync:front]
    dotenv: [.env]
    dir: ./e2e/playwright
    cmds:
      - npm install
      - echo "E2E — поднимаем backend/frontend (если ещё не запущены) и гоняем Playwright…"
      - npx playwright test --reporter=line
  
  sync:back:
    desc: Sync backend dependencies
    cmds:
      - uv sync --directory backend --extra dev --python 3.12
  
  sync:front:
    desc: Sync frontend dependencies
    dir: ./frontend
    cmds:
      - npm install

  deploy:sync:
    desc: Install pyinfra deploy dependencies
    cmds:
      - uv sync --group deploy

  deploy:bootstrap:
    desc: First-time VPS setup (Docker, git clone, .env, compose)
    deps: [deploy:sync]
    cmds:
      - uv run --group deploy --directory deploy pyinfra inventory.py bootstrap.py -y

  deploy:bootstrap-dry:
    desc: Preview first-time VPS bootstrap
    deps: [deploy:sync]
    cmds:
      - uv run --group deploy --directory deploy pyinfra inventory.py bootstrap.py --dry

  deploy:update:
    desc: Manual update on VPS (git pull + compose pull, keeps .env)
    deps: [deploy:sync]
    cmds:
      - uv run --group deploy --directory deploy pyinfra inventory.py update.py -y

  deploy:update-dry:
    desc: Preview manual VPS update
    deps: [deploy:sync]
    cmds:
      - uv run --group deploy --directory deploy pyinfra inventory.py update.py --dry

  deploy:
    desc: Alias for deploy:update (routine deploy is automatic via GitHub Actions)
    cmds:
      - task: deploy:update
