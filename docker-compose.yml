services:
  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    image: instrumenta-api:latest
    container_name: instrumenta-api
    ports:
      - "8000:8000"
    env_file:
      - path: .env
        required: false
    environment:
      CACHE_DIR: "/app/cache"
      REDIS_URL: "redis://redis:6379/0"
      INSTRUMENTA_REPO_ROOT: "/app"
    volumes:
      - ./cache:/app/cache
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: instrumenta-web:latest
    container_name: instrumenta-web
    ports:
      - "3000:80"
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: instrumenta-redis
    volumes:
      - redisdata:/data
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  notifier:
    image: instrumenta-api:latest
    container_name: instrumenta-notifier
    command: ["/app/notifier"]
    env_file:
      - path: .env
        required: false
    environment:
      CACHE_DIR: "/app/cache"
      REDIS_URL: "redis://redis:6379/0"
      INSTRUMENTA_REPO_ROOT: "/app"
    volumes:
      - ./cache:/app/cache
    depends_on:
      redis:
        condition: service_healthy
      api:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    container_name: instrumenta-db
    profiles: ["postgres"]
    environment:
      POSTGRES_USER: instrumenta
      POSTGRES_PASSWORD: instrumenta
      POSTGRES_DB: instrumenta
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"

volumes:
  pgdata:
  redisdata:
