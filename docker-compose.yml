services:
  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    image: bond-monitor-api:latest
    container_name: bond-monitor-api
    ports:
      - "8000:8000"
    env_file:
      - path: .env
        required: false
    environment:
      PYTHONUNBUFFERED: "1"
      CACHE_DIR: "/app/cache"
      REDIS_URL: "redis://redis:6379/0"
    volumes:
      - ./data/ratings.json:/app/data/ratings.json:ro
      - ./cache:/app/cache
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: bond-monitor-web:latest
    container_name: bond-monitor-web
    ports:
      - "3000:80"
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: bond-monitor-redis
    volumes:
      - redisdata:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  notifier:
    image: bond-monitor-api:latest
    container_name: bond-monitor-notifier
    command: ["python", "-m", "bond_monitor.notifier"]
    env_file:
      - path: .env
        required: false
    environment:
      PYTHONUNBUFFERED: "1"
      CACHE_DIR: "/app/cache"
      REDIS_URL: "redis://redis:6379/0"
    volumes:
      - ./data/ratings.json:/app/data/ratings.json:ro
      - ./cache:/app/cache
    depends_on:
      redis:
        condition: service_healthy
      api:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    container_name: bond-monitor-db
    profiles: ["postgres"]
    environment:
      POSTGRES_USER: bondmonitor
      POSTGRES_PASSWORD: bondmonitor
      POSTGRES_DB: bondmonitor
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"

volumes:
  pgdata:
  redisdata:
