services:
  api:
    image: ghcr.io/tonatos/bond-monitor-api:${IMAGE_TAG:-main}
    build: !reset null
    ports: !reset []
    environment:
      LOG_LEVEL: INFO
      REDIS_URL: redis://redis:6379/0

  notifier:
    image: ghcr.io/tonatos/bond-monitor-api:${IMAGE_TAG:-main}
    environment:
      LOG_LEVEL: INFO
      REDIS_URL: redis://redis:6379/0

  web:
    image: ghcr.io/tonatos/bond-monitor-web:${IMAGE_TAG:-main}
    build: !reset null
    ports: !reset []

  redis:
    ports: !reset []

  caddy:
    image: caddy:2-alpine
    container_name: bond-monitor-caddy
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN:?DOMAIN is required}
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - ${TLS_CADDY_DATA_DIR:-/opt/tls/caddy}:/data
      - ${TLS_CADDY_CONFIG_DIR:-/opt/tls/caddy-config}:/config
    depends_on:
      web:
        condition: service_started
    restart: unless-stopped
