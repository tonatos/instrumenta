services:
  api:
    image: ghcr.io/tonatos/instrumenta-api:${IMAGE_TAG:-main}
    build: !reset null
    ports: !reset []
    environment:
      LOG_LEVEL: INFO
      REDIS_URL: redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy

  notifier:
    image: ghcr.io/tonatos/instrumenta-api:${IMAGE_TAG:-main}
    environment:
      LOG_LEVEL: INFO
      REDIS_URL: redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy

  web:
    image: ghcr.io/tonatos/instrumenta-web:${IMAGE_TAG:-main}
    build: !reset null
    ports: !reset []

  redis:
    ports: !reset []

  db:
    profiles: !reset []
    ports: !reset []
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}

  caddy:
    image: caddy:2-alpine
    container_name: instrumenta-caddy
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN:?DOMAIN is required}
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - ${TLS_CADDY_DATA_DIR:-/opt/tls/caddy}:/data
      - ${TLS_CADDY_CONFIG_DIR:-/opt/tls/caddy-config}:/config
    depends_on:
      web:
        condition: service_started
    restart: unless-stopped
