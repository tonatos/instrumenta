services:
  api:
    ports: !reset []
    environment:
      LOG_LEVEL: INFO

  web:
    ports: !reset []

  caddy:
    image: caddy:2-alpine
    container_name: bond-monitor-caddy
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN:?DOMAIN is required}
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      web:
        condition: service_started
    restart: unless-stopped

volumes:
  caddy_data:
  caddy_config:
